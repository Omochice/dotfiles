name: Update flake.lock and nvfetcher files

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  list-inputs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.list-inputs.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          matrix=$(nix eval --impure --json --expr "builtins.attrNames (builtins.getFlake (toString ./.)).inputs")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        id: list-inputs

  update-flake-inputs:
    needs: list-inputs
    runs-on: ubuntu-latest
    environment: renovate
    timeout-minutes: 30
    strategy:
      matrix:
        input-name: ${{ fromJSON(needs.list-inputs.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Get token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          client-id: ${{ vars.RENOVATE_CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: |
            dotfiles
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update ${{ matrix.input-name }}
        id: update
        run: |
          nix flake update "$TARGET"
          if git diff --quiet flake.lock _sources; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TARGET: ${{ matrix.input-name }}
      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update ${{ matrix.input-name }}"
          title: "chore: update ${{ matrix.input-name }}"
          body: "Automated update of flake.lock"
          add-paths: |
            flake.lock
            _sources/*
          branch: update-flake-lock-${{ matrix.input-name }}

  list-nvfetcher-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.list-packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix: "false"
      - run: |
          matrix=$(nix eval --impure --expr 'builtins.attrNames (builtins.fromTOML (builtins.readFile ./nvfetcher.toml))' --json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        id: list-packages

  update-nvfetcher:
    needs: list-nvfetcher-packages
    runs-on: ubuntu-latest
    environment: renovate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package-name: ${{ fromJSON(needs.list-nvfetcher-packages.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Get token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          client-id: ${{ vars.RENOVATE_CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: |
            dotfiles
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve owner/repo
        id: resolve
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
        run: |
          owner_repo=$(jq -r --arg pkg "$PACKAGE_NAME" '.[$pkg].src | if .owner and .repo then "\(.owner)/\(.repo)" else (.url | sub("^https?://"; "")) end' _sources/generated.json)
          echo "owner-repo=$owner_repo" >> "$GITHUB_OUTPUT"
      - name: Update nvfetcher
        id: update
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
        run: |
          nix run .#sync -- --filter "^${PACKAGE_NAME}$" --keep-old
          if git diff --quiet _sources; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update nvfetcher ${{ steps.resolve.outputs.owner-repo }}"
          title: "chore: update nvfetcher ${{ steps.resolve.outputs.owner-repo }}"
          add-paths: |
            _sources/*
          branch: update-nvfetcher-${{ matrix.package-name }}
