name: Code check

on:
  push: null
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  path-filter:
    timeout-minutes: 5
    outputs:
      # keep-sorted start
      actions: ${{steps.changes.outputs.actions}}
      deno: ${{steps.changes.outputs.deno}}
      flake: ${{steps.changes.outputs.flake}}
      karabiner: ${{steps.changes.outputs.karabiner}}
      renovate: ${{steps.changes.outputs.renovate}}
      # keep-sorted end
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            actions:
              - .github/workflows/*.yml
              - .github/workflows/*.yaml
              - .github/actions/*.yml
              - .github/actions/*.yaml
              - aqua.yaml
              - flake.nix
              - flake.lock
            deno:
              - scripts/**/*.ts
              - config/nvim/rc/ts/*.ts
              - config/nvim-dark/**/*.ts
              - config/skhd/queries/*.ts
              - .github/workflows/check.yml
            karabiner:
              - config/karabiner/mod.ts
              - .github/workflows/check.yml
            flake:
              - _sources/*
              - pkgs/**/*.nix
              - config/**/*.nix
              - flake.nix
              - flake.lock
            renovate:
              - renovate.json5
  check-format:
    timeout-minutes: 5
    name: Check code format
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build ".#checks.$(nix eval --impure --raw --expr 'builtins.currentSystem').formatting"
  check-actions:
    needs: path-filter
    if: needs.path-filter.outputs.actions == 'true'
    timeout-minutes: 30
    name: Check GitHub actions
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build ".#checks.$(nix eval --impure --raw --expr 'builtins.currentSystem').actions"
  check-deno:
    needs: path-filter
    if: needs.path-filter.outputs.deno == 'true'
    timeout-minutes: 5
    name: Check type
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: rc
      - name: type check
        run: deno check scripts/**/*.ts config/nvim/rc/ts/*.ts
      - name: linting
        run: deno lint scripts/**/*.ts config/nvim/rc/ts/*.ts
      - name: testing
        run: deno test --doc config/nvim/rc/**/*.ts
  check-home-manager:
    needs: path-filter
    if: needs.path-filter.outputs.flake == 'true'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu
          - macos
    runs-on: ${{ matrix.os }}-latest
    permissions: {}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix: false
      - run: nix run .#install-check
  check-renovate:
    timeout-minutes: 5
    needs: path-filter
    if: needs.path-filter.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build ".#checks.$(nix eval --impure --raw --expr 'builtins.currentSystem').renovate"
  status-check:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs:
      # keep-sorted start
      - check-actions
      - check-deno
      - check-format
      - check-home-manager
      - check-renovate
      # keep-sorted end
    permissions: {}
    if: failure()
    steps:
      - run: exit 1
