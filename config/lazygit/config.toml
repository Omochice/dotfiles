# :schema  https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

[git.log]
order = "topo-order"
showGraph = "always"

[gui]
mouseEvents = false
timeFormat = "2006-01-02"
shortTimeFormat = "15:04:05"
useHunkModeInStagingView = false

[keybinding]

[keybinding.commits]
cherryPickCopy = "c"
pasteCommits = "v"

[keybinding.universal]
toggleRangeSelect = "V"
openFile = "<disabled>"
